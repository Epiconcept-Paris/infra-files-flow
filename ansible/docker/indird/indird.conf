{
    "GEDLAD91_KS_L1L2_LAD": {
        "actions": {
            "copy": {
                "cmd": "chmod 0664 \"$i_FILE\" && rsync -a -e \"ssh -i $i_home/.ssh/rsync -l $i_user\" \"$i_FILE\" --no-group --whole-file --partial-dir ../tmp $i_front:$i_remotedir",
                "desc": "copy file to front"
            },
            "copyL1L2V2": {
                "cmd": "chmod 0664 \"$i_FILE\" && rsync -a -e \"ssh -i $i_home/.ssh/rsync -l $i_user\" \"$i_FILE\" --no-group --whole-file --partial-dir ../tmp $i_front:$i_home/KS_L1L2-V2_LAD/",
                "desc": "copy file to front"
            }
        },
        "conds": {
            "any": true,
            "ko": "test $i_CODE -ne 0",
            "ok": "test $i_CODE -eq 0"
        },
        "debug": false,
        "ends": {
            "done": {
                "cmd": "mv \"$i_FILE\" $i_home/$i_donedir/",
                "desc": "move file to archive dir"
            },
            "fail": {
                "cmd": "mv \"$i_FILE\" $i_home/$i_faildir/",
                "desc": "move file to fail dir"
            },
            "failmail": {
                "cmd": "mail -s \"FAILED $i_CONF - $i_FILE stat=$i_CODE\" $i_mailto",
                "desc": "send mail when failed"
            },
            "mail": {
                "cmd": "mail -s \"$i_maillib $i_CONF - $i_FILE stat=$i_CODE\" $i_mailto",
                "desc": "send mail"
            },
            "output": {
                "cmd": "cat >> /var/log/indird-$i_CONF.log",
                "desc": "debug log",
                "stdin": "all"
            }
        },
        "env": {
            "donedir": "done/KS/L1L2/LAD",
            "faildir": "fail/KS/L1L2/LAD",
            "front": "profntd1",
            "home": "/space/home/GEDLAD91/",
            "mailto": "tech3@epiconcept.fr,support-team3@epiconcept.fr",
            "remotedir": "/space/home/GEDLAD91/KS_L1L2_LAD/",
            "user": "GEDLAD91"
        },
        "env_prefix": "i_",
        "filetypes": {
            "L1L2v2": {
                "desc": "L1L2-v2 files",
                "method": "regexp",
                "pattern": "L1L2-V2"
            },
            "all": {
                "desc": "all files",
                "method": "vregexp",
                "pattern": "L1L2-V2"
            }
        },
        "logs": {
            "debug": {
                "args": {
                    "path": "/var/log/indird-$i_CONF.log"
                },
                "desc": "log to file",
                "type": "file"
            },
            "default": {
                "args": {
                    "facility": "user",
                    "level": "err"
                },
                "desc": "log to syslog",
                "type": "syslog"
            }
        },
        "path": "/space/home/GEDLAD91/KS/L1L2/LAD/",
        "rules": {
            "L1L2v2": [
                {
                    "action": "copyL1L2V2",
                    "desc": "GEDLAD91_fichiers_L1L2V2",
                    "ends": [
                        {
                            "cond": "ok",
                            "end": "done"
                        },
                        {
                            "cond": "ko",
                            "end": "fail"
                        },
                        {
                            "cond": "ko",
                            "end": "failmail"
                        },
                        {
                            "cond": "any",
                            "end": "output"
                        }
                    ],
                    "logs": [
                        "debug",
                        "default"
                    ]
                }
            ],
            "all": [
                {
                    "action": "copy",
                    "desc": "GEDLAD91_fichiers_else",
                    "ends": [
                        {
                            "cond": "ok",
                            "end": "done"
                        },
                        {
                            "cond": "ko",
                            "end": "fail"
                        },
                        {
                            "cond": "ko",
                            "end": "failmail"
                        },
                        {
                            "cond": "any",
                            "end": "output"
                        }
                    ],
                    "logs": [
                        "debug",
                        "default"
                    ]
                }
            ]
        },
        "sleep": 60
    }
}
