---

- name: debug filename
  tags: ['subconf']
  debug:
    var: flowname

- name: debug server
  tags: ['subconf']
  debug:
    var: server


- name: create dirs in server
  tags: ['subconf']
  file:
    status: directory
    path: "/etc/indird.d/{{flowname}}"
  become: true
  delegate_to: "{{server}}"
  when: inventory_hostname == server


